<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>App Mascotas PRO++</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: linear-gradient(-45deg, #6d28d9, #c084fc, #e879f9, #9333ea);
  background-size: 400% 400%;
  animation: fondo 10s ease infinite;
}

@keyframes fondo {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

header {
  background: linear-gradient(135deg, #4c1d95, #c084fc);
  color: white;
  border-radius: 0 0 30px 30px;
}

section.card {
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(15px);
  border-radius: 20px;
}

button {
  background: linear-gradient(135deg, #9333ea, #e879f9);
  border: none;
  color: white;
}

button:hover {
  transform: scale(1.05);
}

.oculto {
  display: none;
}
</style>
</head>

<body>

<!-- LOGIN -->
<main class="container mt-5" id="loginSection">

<section class="card p-4 shadow text-center">

<h2>🔐 Iniciar Sesión</h2>

<input type="text" id="loginUser" class="form-control mt-3" placeholder="Usuario">
<input type="password" id="loginPass" class="form-control mt-3" placeholder="Contraseña">

<button class="mt-4 w-100" onclick="login()">Entrar</button>

<p class="mt-3">
¿No tienes cuenta? 
<a href="#" onclick="mostrarRegistro()">Regístrate</a>
</p>

<p id="loginMsg"></p>

</section>

</main>

<!-- REGISTRO -->
<main class="container mt-5 oculto" id="registroSection">

<section class="card p-4 shadow text-center">

<h2>📝 Crear Cuenta</h2>

<input type="text" id="regUser" class="form-control mt-3" placeholder="Usuario">
<input type="password" id="regPass" class="form-control mt-3" placeholder="Contraseña">

<button class="mt-4 w-100" onclick="registrar()">Registrarse</button>

<p class="mt-3">
¿Ya tienes cuenta? 
<a href="#" onclick="mostrarLogin()">Inicia sesión</a>
</p>

<p id="regMsg"></p>

</section>

</main>

<!-- APP -->
<section id="appSection" class="oculto">

<header class="text-center p-4 shadow">
  <h1>🐶 App Mascotas PRO++</h1>
  <p id="bienvenida"></p>
  <button onclick="logout()">Cerrar sesión</button>
</header>

<main class="container mt-4">

<section class="card p-4 shadow">

<form id="formMascota">
<input type="hidden" id="editIndex">

<input type="text" id="nombre" class="form-control mt-2" placeholder="Nombre">
<input type="number" id="edad" class="form-control mt-2" placeholder="Edad">
<input type="text" id="tipo" class="form-control mt-2" placeholder="Tipo">

<button class="mt-3 w-100">Guardar</button>
</form>

</section>

<section class="mt-3">
<input type="text" id="buscar" class="form-control" placeholder="Buscar...">
</section>

<section id="listaMascotas"></section>

</main>

</section>

<script>

// USUARIOS
let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

// CAMBIAR VISTAS
function mostrarRegistro(){
  document.getElementById("loginSection").classList.add("oculto");
  document.getElementById("registroSection").classList.remove("oculto");
}

function mostrarLogin(){
  document.getElementById("registroSection").classList.add("oculto");
  document.getElementById("loginSection").classList.remove("oculto");
}

// REGISTRO
function registrar(){
  let user = document.getElementById("regUser").value;
  let pass = document.getElementById("regPass").value;

  if(user === "" || pass === ""){
    document.getElementById("regMsg").textContent = "❌ Completa los campos";
    return;
  }

  let existe = usuarios.find(u => u.user === user);

  if(existe){
    document.getElementById("regMsg").textContent = "⚠️ Usuario ya existe";
    return;
  }

  usuarios.push({user, pass});
  localStorage.setItem("usuarios", JSON.stringify(usuarios));

  document.getElementById("regMsg").textContent = "✅ Usuario creado";
}

// LOGIN
function login(){
  let user = document.getElementById("loginUser").value;
  let pass = document.getElementById("loginPass").value;

  let valido = usuarios.find(u => u.user === user && u.pass === pass);

  if(valido){
    localStorage.setItem("usuarioActivo", user);
    iniciarApp();
  } else {
    document.getElementById("loginMsg").textContent = "❌ Datos incorrectos";
  }
}

// LOGOUT
function logout(){
  localStorage.removeItem("usuarioActivo");
  location.reload();
}

// INICIAR APP
function iniciarApp(){
  document.getElementById("loginSection").classList.add("oculto");
  document.getElementById("registroSection").classList.add("oculto");
  document.getElementById("appSection").classList.remove("oculto");

  let user = localStorage.getItem("usuarioActivo");
  document.getElementById("bienvenida").textContent = "Bienvenida " + user + " 💜";
}

// MASCOTAS
let mascotas = JSON.parse(localStorage.getItem("mascotas")) || [];

const form = document.getElementById("formMascota");
const lista = document.getElementById("listaMascotas");
const buscador = document.getElementById("buscar");

function guardar(){
  localStorage.setItem("mascotas", JSON.stringify(mascotas));
}

function mostrar(listaFiltrada){
  lista.innerHTML = "";

  listaFiltrada.forEach((m, i) => {
    let card = document.createElement("article");

    card.innerHTML = `
      <h5>${m.nombre}</h5>
      <p>${m.tipo} - ${m.edad} años</p>
      <button onclick="editar(${i})">Editar</button>
      <button onclick="eliminar(${i})">Eliminar</button>
    `;

    lista.appendChild(card);
  });
}

form.addEventListener("submit", function(e){
  e.preventDefault();

  let nombre = document.getElementById("nombre").value;
  let edad = document.getElementById("edad").value;
  let tipo = document.getElementById("tipo").value;
  let index = document.getElementById("editIndex").value;

  let mascota = {nombre, edad, tipo};

  if(index === ""){
    mascotas.push(mascota);
  } else {
    mascotas[index] = mascota;
  }

  guardar();
  mostrar(mascotas);
  form.reset();
  document.getElementById("editIndex").value = "";
});

function eliminar(i){
  mascotas.splice(i,1);
  guardar();
  mostrar(mascotas);
}

function editar(i){
  let m = mascotas[i];

  document.getElementById("nombre").value = m.nombre;
  document.getElementById("edad").value = m.edad;
  document.getElementById("tipo").value = m.tipo;
  document.getElementById("editIndex").value = i;
}

buscador.addEventListener("input", function(){
  let texto = this.value.toLowerCase();

  let filtradas = mascotas.filter(m =>
    m.nombre.toLowerCase().includes(texto)
  );

  mostrar(filtradas);
});

// AUTO LOGIN
if(localStorage.getItem("usuarioActivo")){
  iniciarApp();
  mostrar(mascotas);
}

</script>

</body>
</html>
